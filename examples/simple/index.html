<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tailscale-web</title>
    <style>
      /* ── Design tokens ── */
      :root {
        --bg-primary:    #F9F7F6;
        --bg-secondary:  #f7f5f0;
        --bg-tertiary:   #f0eeea;
        --bg-hover:      #f0eeea;
        --text-primary:  #2E2D2D;
        --text-secondary:#555555;
        --text-muted:    #706f6c;
        --border-color:  #e8e6e1;
        --card-bg:       #ffffff;
        --input-bg:      #ffffff;
        --color-success: #0A805B;
        --color-error:   #E46C63;
        --color-accent:  #4B70CC;
        --color-accent-hover: #3a5bb3;
        --shadow:        0 1px 3px rgba(0,0,0,.08);
        --shadow-lg:     0 4px 12px rgba(0,0,0,.12);
        --header-bg:     #f7f5f4;
        --mono:          'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      [data-theme="dark"] {
        --bg-primary:    #1c1c1c;
        --bg-secondary:  #232323;
        --bg-tertiary:   #2a2a2a;
        --bg-hover:      #333333;
        --text-primary:  #e5e5e5;
        --text-secondary:#b3b3b3;
        --text-muted:    #808080;
        --border-color:  #333333;
        --card-bg:       #232323;
        --input-bg:      #1c1c1c;
        --shadow:        0 1px 3px rgba(0,0,0,.3);
        --shadow-lg:     0 4px 12px rgba(0,0,0,.4);
        --header-bg:     #232323;
      }

      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Roboto, sans-serif;
        font-size: .875rem; line-height: 1.5;
        background: var(--bg-primary); color: var(--text-primary);
        min-height: 100vh;
      }
      button { font-family: inherit; cursor: pointer; }
      input, textarea, select { font-family: inherit; font-size: inherit; }
      [hidden] { display: none !important; }

      /* ── Login screen ── */
      #screen-login {
        min-height: 100vh; display: flex;
        align-items: center; justify-content: center;
        padding: 2rem;
      }
      .login-card { text-align: center; max-width: 380px; width: 100%; }
      .login-logo {
        display: flex; flex-direction: column;
        align-items: center; gap: .5rem; margin-bottom: 2.5rem;
      }
      .login-logo img { width: 220px; height: auto; }
      .login-logo img.invert { filter: brightness(0) invert(1); }
      .login-title { font-size: 1.125rem; font-weight: 600; letter-spacing: -.02em; color: var(--text-primary); }
      .login-sub   { font-size: .8125rem; color: var(--text-muted); margin-top: .25rem; }
      .login-status {
        display: flex; flex-direction: column; align-items: center;
        gap: .875rem; padding: 1.25rem 0;
      }
      .login-status p { color: var(--text-muted); font-size: .875rem; }
      .spinner {
        width: 22px; height: 22px;
        border: 2.5px solid var(--border-color);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: spin .75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .btn-auth {
        width: 100%; padding: .875rem 2rem;
        background: #1f1e1e; color: #fff;
        border: none; border-radius: 8px;
        font-size: 1rem; font-weight: 600;
        box-shadow: var(--shadow);
        transition: background .15s;
      }
      .btn-auth:hover { background: #000; }
      [data-theme="dark"] .btn-auth { background: #fff; color: #1f1e1e; }
      [data-theme="dark"] .btn-auth:hover { background: #e8e8e8; }

      /* ── App shell ── */
      #screen-app { display: flex; flex-direction: column; min-height: 100vh; }

      /* header */
      .header { background: var(--header-bg); border-bottom: 1px solid var(--border-color); }
      .header-inner {
        max-width: 960px; margin: 0 auto; padding: 0 1.5rem;
        display: flex; align-items: center; justify-content: space-between;
        height: 48px;
      }
      .brand { display: flex; align-items: center; gap: .625rem; }
      .brand-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--color-success); flex-shrink: 0;
      }
      .brand-name { font-weight: 600; font-size: .9375rem; letter-spacing: -.015em; }
      .header-right { display: flex; align-items: center; gap: 1rem; }
      .vpn-badge {
        display: flex; align-items: center; gap: .375rem;
        font-size: .75rem; color: var(--text-muted);
      }
      .vpn-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
      .btn-link {
        background: none; border: none; padding: 0;
        font-size: .75rem; color: var(--text-muted);
        text-decoration: underline; text-underline-offset: 2px;
        transition: color .15s;
      }
      .btn-link:hover { color: var(--text-primary); }
      .btn-icon {
        background: none; border: none; padding: .375rem;
        color: var(--text-muted); line-height: 1;
        display: flex; align-items: center; border-radius: 4px;
        transition: color .15s, background .15s;
      }
      .btn-icon:hover { color: var(--text-primary); background: var(--bg-hover); }

      /* tabs */
      .nav-tabs {
        border-bottom: 1px solid var(--border-color);
        padding: 0 1.5rem; background: var(--bg-primary);
        max-width: 960px; margin: 0 auto; width: 100%;
        display: flex;
      }
      .nav-tab {
        background: none; border: none;
        padding: .75rem 1.25rem;
        color: var(--text-muted); font-size: .875rem; font-weight: 500;
        border-bottom: 2px solid transparent;
        transition: color .15s, border-color .15s;
      }
      .nav-tab:hover { color: var(--text-primary); }
      .nav-tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }

      /* content area */
      .content { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }
      .tab-panel[hidden] { display: none !important; }

      /* shared form + card */
      .card {
        background: var(--card-bg); border: 1px solid var(--border-color);
        border-radius: 8px; padding: 1.25rem;
      }
      .field { margin-bottom: .875rem; }
      .field label { display: block; font-size: .75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: .3rem; }
      .field input, .field select, .field textarea {
        width: 100%; padding: .4375rem .625rem;
        border: 1px solid var(--border-color); border-radius: 6px;
        background: var(--input-bg); color: var(--text-primary);
        transition: border-color .15s;
      }
      .field input:focus, .field textarea:focus {
        outline: none; border-color: var(--color-accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent) 20%, transparent);
      }
      .field textarea { resize: vertical; min-height: 72px; font-family: var(--mono); font-size: .8125rem; }
      .field-row { display: flex; gap: .625rem; }
      .field-row .field { flex: 1; margin-bottom: 0; }
      .btn {
        padding: .4375rem .875rem; border-radius: 6px;
        border: 1px solid var(--border-color); font-size: .8125rem; font-weight: 500;
        background: var(--bg-primary); color: var(--text-primary);
        transition: background .15s;
      }
      .btn:hover { background: var(--bg-hover); }
      .btn:disabled { opacity: .45; cursor: not-allowed; }
      .btn-primary {
        background: var(--color-accent); color: #fff;
        border-color: var(--color-accent);
      }
      .btn-primary:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }
      .btn-danger { background: var(--color-error); color: #fff; border-color: var(--color-error); }

      /* output / terminal */
      .output {
        margin-top: 1rem; padding: .75rem;
        background: var(--bg-tertiary); border: 1px solid var(--border-color);
        border-radius: 6px; font-family: var(--mono); font-size: .8125rem;
        min-height: 80px; white-space: pre-wrap; word-break: break-all;
        color: var(--text-primary); line-height: 1.6;
      }
      .output .line-sent   { color: var(--color-accent); }
      .output .line-recv   { color: var(--text-primary); }
      .output .line-meta   { color: var(--text-muted); }
      .output .line-ok     { color: var(--color-success); }
      .output .line-err    { color: var(--color-error); }

      /* ping result chip */
      .ping-result {
        display: inline-flex; align-items: center; gap: .5rem;
        margin-top: 1rem; padding: .5rem .875rem;
        border-radius: 6px; font-size: .875rem; font-weight: 500;
        background: var(--bg-tertiary); border: 1px solid var(--border-color);
      }
      .ping-result.alive  { border-color: var(--color-success); color: var(--color-success); }
      .ping-result.dead   { border-color: var(--color-error);   color: var(--color-error);   }

      /* error banner */
      .error-banner {
        padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1rem;
        background: color-mix(in srgb, var(--color-error) 10%, transparent);
        border: 1px solid var(--color-error); color: var(--color-error);
        font-size: .8125rem;
      }

      /* response meta */
      .resp-meta { display: flex; gap: .75rem; align-items: center; margin-bottom: .625rem; flex-wrap: wrap; }
      .status-chip {
        padding: .1875rem .5rem; border-radius: 4px; font-size: .75rem;
        font-weight: 600; font-family: var(--mono);
      }
      .status-chip.ok  { background: color-mix(in srgb, var(--color-success) 15%, transparent); color: var(--color-success); }
      .status-chip.err { background: color-mix(in srgb, var(--color-error)   15%, transparent); color: var(--color-error); }

      /* theme icon visibility */
      .icon-sun  { display: none; }
      .icon-moon { display: block; }
      [data-theme="dark"] .icon-sun  { display: block; }
      [data-theme="dark"] .icon-moon { display: none; }

      /* dial connection bar */
      .conn-bar {
        display: flex; align-items: center; gap: .625rem;
        padding: .5rem .75rem; border-radius: 6px; margin-bottom: .875rem;
        background: color-mix(in srgb, var(--color-success) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent);
        font-size: .8125rem; color: var(--color-success);
      }
      .conn-bar-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-success); }
    </style>
  </head>
  <body>

    <!-- ── Login ── -->
    <div id="screen-login">
      <div class="login-card">
        <div class="login-logo">
          <img id="ts-logo"
            src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Tailscale-Logo-Black.svg"
            alt="Tailscale" />
          <div>
            <div class="login-title">tailscale-web</div>
            <div class="login-sub">browser network playground</div>
          </div>
        </div>

        <div id="error-login" class="error-banner" hidden></div>

        <div id="login-status" class="login-status">
          <div class="spinner"></div>
          <p>Initializing Tailscale…</p>
        </div>

        <button id="btn-auth" class="btn-auth" hidden>
          Login with Tailscale
        </button>
      </div>
    </div>

    <!-- ── App ── -->
    <div id="screen-app" hidden>
      <div class="header">
        <div class="header-inner">
          <div class="brand">
            <div class="brand-dot"></div>
            <span class="brand-name">tailscale-web</span>
          </div>
          <div class="header-right">
            <div class="vpn-badge">
              <div class="vpn-badge-dot"></div>
              VPN Connected
            </div>
            <button class="btn-link" id="btn-disconnect">Disconnect</button>
            <button class="btn-icon" id="btn-theme" title="Toggle theme">
              <!-- icons toggled via CSS on data-theme, no JS needed -->
              <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div style="max-width:960px;margin:0 auto;width:100%;">
        <div class="nav-tabs">
          <button class="nav-tab active" data-tab="ping">Ping</button>
          <button class="nav-tab"        data-tab="fetch">Fetch</button>
          <button class="nav-tab"        data-tab="dial">Dial</button>
        </div>
      </div>

      <div class="content">

        <!-- Ping -->
        <div id="tab-ping" class="tab-panel">
          <div class="card">
            <div class="field-row">
              <div class="field">
                <label>Address</label>
                <input id="ping-addr" type="text" placeholder="hostname or host:port" value="" />
              </div>
              <div class="field" style="flex:0;display:flex;align-items:flex-end;">
                <button id="btn-ping" class="btn btn-primary">Ping</button>
              </div>
            </div>
            <div id="ping-result" hidden></div>
          </div>
        </div>

        <!-- Fetch -->
        <div id="tab-fetch" class="tab-panel" hidden>
          <div class="card">
            <div id="fetch-error" class="error-banner" hidden></div>
            <div class="field-row">
              <div class="field" style="flex:0;min-width:120px;">
                <label>Method</label>
                <select id="fetch-method">
                  <option>GET</option><option>POST</option>
                  <option>PUT</option><option>PATCH</option><option>DELETE</option>
                </select>
              </div>
              <div class="field">
                <label>URL</label>
                <input id="fetch-url" type="text" placeholder="http://hostname/path" />
              </div>
            </div>
            <div class="field">
              <label>Headers <span style="font-weight:400;color:var(--text-muted)">(one per line: Key: Value)</span></label>
              <textarea id="fetch-headers" placeholder="Content-Type: application/json"></textarea>
            </div>
            <div class="field">
              <label>Body</label>
              <textarea id="fetch-body" placeholder='{"key": "value"}'></textarea>
            </div>
            <button id="btn-fetch" class="btn btn-primary">Send</button>
            <div id="fetch-result" hidden>
              <div class="resp-meta" style="margin-top:1rem;">
                <span id="fetch-status" class="status-chip"></span>
                <span id="fetch-status-text" style="color:var(--text-muted);font-size:.75rem;font-family:var(--mono)"></span>
              </div>
              <div id="fetch-headers-out" style="font-size:.75rem;color:var(--text-muted);font-family:var(--mono);margin-bottom:.5rem;"></div>
              <div id="fetch-body-out" class="output" style="margin-top:0;"></div>
            </div>
          </div>
        </div>

        <!-- Dial -->
        <div id="tab-dial" class="tab-panel" hidden>
          <div class="card" id="dial-connect-form">
            <div id="dial-error" class="error-banner" hidden></div>
            <div class="field-row">
              <div class="field">
                <label>Address</label>
                <input id="dial-addr" type="text" placeholder="host:port" value="" />
              </div>
              <div class="field" style="flex:0;display:flex;align-items:flex-end;">
                <button id="btn-dial-connect" class="btn btn-primary">Connect</button>
              </div>
            </div>
          </div>

          <div id="dial-session" hidden>
            <div class="conn-bar">
              <div class="conn-bar-dot"></div>
              <span id="dial-connected-addr"></span>
              <button id="btn-dial-disconnect" class="btn btn-danger btn-sm" style="margin-left:auto;padding:.2rem .6rem;font-size:.75rem;">Disconnect</button>
            </div>
            <div class="field-row" style="margin-bottom:.625rem;">
              <div class="field" style="margin-bottom:0;">
                <input id="dial-send-input" type="text" placeholder="type a message and press Enter…" />
              </div>
              <button id="btn-dial-send" class="btn btn-primary">Send</button>
            </div>
            <div id="dial-output" class="output"></div>
          </div>
        </div>

      </div><!-- .content -->
    </div><!-- #screen-app -->

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
