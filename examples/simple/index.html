<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>tailscale-web</title>
</head>
<body>
  <pre id="info">Connecting...</pre>
  <script type="module">
    import { network } from "https://esm.sh/tailscale-web@0.1.10"

    await network.init({
      hostname: "tailscale-web",
      onAuthRequired(url) {
        window.open(url, "_blank", "width=600,height=700")
      },
    })

    window.network = network
    document.getElementById("info").textContent = "Connected!\n\nUse window.network in the console to interact with network."
  </script>
</body>
</html>
